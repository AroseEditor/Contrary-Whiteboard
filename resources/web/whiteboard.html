<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Contrary Whiteboard — Live</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#111827;color:#f3f4f6;font-family:'Inter',system-ui,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* ── Name overlay ── */
#nameOverlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(6px)}
#nameCard{background:#1f2937;border:1px solid #374151;border-radius:16px;padding:36px 40px;text-align:center;min-width:320px}
#nameCard h2{font-size:22px;font-weight:700;margin-bottom:6px;color:#f9fafb}
#nameCard p{font-size:13px;color:#9ca3af;margin-bottom:22px}
#nameInput{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid #374151;background:#111827;color:#f3f4f6;font-size:15px;outline:none;transition:border-color .2s}
#nameInput:focus{border-color:#3b82f6}
#nameBtn{margin-top:14px;width:100%;padding:11px;border-radius:10px;border:none;background:#3b82f6;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
#nameBtn:hover{background:#2563eb}

/* ── Toolbar ── */
#toolbar{display:flex;align-items:center;gap:6px;padding:6px 12px;background:#1f2937;border-bottom:1px solid #374151;z-index:100;flex-shrink:0;flex-wrap:wrap}
.tbtn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 9px;border-radius:8px;border:1.5px solid transparent;cursor:pointer;background:rgba(255,255,255,.04);color:#d1d5db;font-size:10px;transition:.15s;user-select:none}
.tbtn svg{width:18px;height:18px}
.tbtn:hover{background:rgba(255,255,255,.1);border-color:#4b5563;color:#fff}
.tbtn.active{background:rgba(59,130,246,.25);border-color:#3b82f6;color:#fff}
.tbtn.factive{background:rgba(52,211,153,.2);border-color:#34d399;color:#34d399}
#colorPick{width:28px;height:28px;border-radius:50%;border:2px solid #4b5563;cursor:pointer;background:none;padding:0}
#sizeSlider{width:70px;accent-color:#3b82f6}
.sep{width:1px;height:22px;background:#374151;margin:0 2px}
.szbtn{padding:3px 8px;border-radius:5px;border:1px solid #374151;background:rgba(255,255,255,.05);color:#9ca3af;cursor:pointer;font-size:13px;line-height:1}
.szbtn:hover{background:rgba(255,255,255,.12);color:#fff}
#tsDisp{font-size:11px;color:#6b7280;min-width:22px;text-align:center}
#statusBar{margin-left:auto;font-size:11px;color:#6b7280;display:flex;align-items:center;gap:6px}
#dot{width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;transition:background .3s}
#dot.ok{background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── Page bar ── */
#pagebar{padding:3px 12px;background:#111827;border-bottom:1px solid #1f2937;font-size:11px;color:#4b5563;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#pageinfo{color:#6b7280;font-weight:600}

/* ── Layout ── */
#mainContainer{display:flex;flex:1;overflow:hidden}
#sidebar{width:160px;background:#111827;border-right:1px solid #1f2937;display:flex;flex-direction:column;padding:12px 0;gap:8px;overflow-y:auto;z-index:50;transition:width .3s}
#sidebar.collapsed{width:0;padding:0;border:none}
.pageItem{padding:10px 16px;font-size:13px;color:#9ca3af;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:10px;border-left:3px solid transparent}
.pageItem:hover{background:rgba(255,255,255,.05);color:#fff}
.pageItem.active{background:rgba(59,130,246,.1);color:#3b82f6;border-left-color:#3b82f6;font-weight:600}
.pageItem svg{width:16px;height:16px}

/* ── Zoom Controls ── */
#zoomControls{position:absolute;bottom:24px;right:24px;display:flex;flex-direction:column;gap:4px;z-index:200}
.zbtn{width:36px;height:36px;border-radius:10px;background:rgba(31,41,55,.9);border:1px solid #374151;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);transition:.15s}
.zbtn:hover{background:#374151;border-color:#4b5563}
.zbtn svg{width:20px;height:20px}
#zoomVal{font-size:11px;color:#9ca3af;text-align:center;margin-top:2px}

/* ── Canvas area ── */
#wrap{flex:1;position:relative;overflow:hidden;touch-action:none}
canvas{position:absolute;top:0;left:0;display:block}
#bg{z-index:0;background:#fff}  /* host snapshot */
#hc{z-index:1;pointer-events:none} /* host live strokes */
#gc{z-index:2}                   /* client / guest strokes */
#cc{z-index:3;pointer-events:none} /* cursors */

/* ── Toast ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(17,24,39,.95);border:1px solid #3b82f6;border-radius:12px;padding:10px 22px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:9999}
#toast.show{opacity:1}
</style>
</head>
<body>

<!-- Name prompt -->
<div id="nameOverlay">
  <div id="nameCard">
    <h2>Join Whiteboard</h2>
    <p>Enter your name so others can see who you are</p>
    <input id="nameInput" type="text" placeholder="Your name" maxlength="24" autocomplete="off">
    <button id="nameBtn" onclick="joinSession()">Join →</button>
  </div>
</div>

<div id="toolbar">
  <button class="tbtn active" id="btn-draw" onclick="setTool('draw')" title="Draw (D)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>Draw
  </button>
  <button class="tbtn" id="btn-erase" onclick="setTool('erase')" title="Erase (E)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/><path d="M6 18L17 7"/></svg>Erase
  </button>
  <button class="tbtn" id="btn-text" onclick="setTool('text')" title="Text (T)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Text
  </button>
  <div class="sep"></div>
  <input type="color" id="colorPick" value="#2563eb" title="Color">
  <input type="range" id="sizeSlider" min="1" max="40" value="4" oninput="document.getElementById('sizeVal').textContent=this.value">
  <span style="font-size:10px;color:#6b7280">Sz:<span id="sizeVal">4</span></span>
  <div class="sep"></div>
  <button class="szbtn" onclick="adjText(-2)" title="Smaller text">A−</button>
  <span id="tsDisp">18</span>
  <button class="szbtn" onclick="adjText(+2)" title="Larger text">A+</button>
  <div class="sep"></div>
  <button class="tbtn" onclick="clearMe()" title="Clear my strokes (X)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>Clear
  </button>
  <div class="sep"></div>
  <button class="tbtn" id="btn-follow" onclick="toggleFollow()" title="Follow host (F)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/></svg>Follow
  </button>
  <div id="statusBar">
    <span id="dot"></span><span id="stxt">Connecting…</span>
  </div>
</div>
<div id="pagebar">📄 <span id="pageinfo">Page 1</span></div>

<div id="mainContainer">
  <div id="sidebar" id="pageSidebar">
    <!-- Pages populated here -->
  </div>
  
  <div id="wrap">
    <canvas id="bg"></canvas>
    <canvas id="hc"></canvas>
    <canvas id="gc"></canvas>
    <canvas id="cc"></canvas>
    
    <div id="zoomControls">
      <button class="zbtn" onclick="zoom(1.2)" title="Zoom In (+)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="zbtn" onclick="zoom(0.8)" title="Zoom Out (-)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="zbtn" onclick="fitScene()" title="Reset View (0)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
      </button>
      <div id="zoomVal">100%</div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Identity & State
// ─────────────────────────────────────────────────────────────────────────────
const GUEST_ID = 'g' + Math.random().toString(36).slice(2,7);
const PALETTE  = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#8b5cf6','#06b6d4'];
const MY_COLOR = PALETTE[Math.floor(Math.random()*PALETTE.length)];
let   MY_NAME  = '';

// Rendering State
let history = []; // Strokes since last snapshot
let bgImg = null;
let sceneW=1920, sceneH=1080, sceneX=0, sceneY=0;
let panX=0, panY=0, scale=1;
let followHost=false;
const peers = {};

// ─────────────────────────────────────────────────────────────────────────────
// Canvas setup
// ─────────────────────────────────────────────────────────────────────────────
const wrap = document.getElementById('wrap');
const bgC  = document.getElementById('bg');   
const hC   = document.getElementById('hc');   
const gC   = document.getElementById('gc');   
const cC   = document.getElementById('cc');   
const bgX  = bgC.getContext('2d');
const hX   = hC.getContext('2d');
const gX   = gC.getContext('2d');
const cX   = cC.getContext('2d');

function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  [bgC,hC,gC,cC].forEach(c=>{c.width=w;c.height=h;});
  fitScene(); redraw();
}
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────────────────────────────────────
// Rendering Logic
// ─────────────────────────────────────────────────────────────────────────────
function fitScene() {
  if(!sceneW||!sceneH) return;
  scale = Math.min(bgC.width/sceneW, bgC.height/sceneH) * 0.95;
  panX  = (bgC.width  - sceneW*scale) / 2;
  panY  = (bgC.height - sceneH*scale) / 2;
}

function applyT(ctx) {
  ctx.setTransform(scale, 0, 0, scale, panX - sceneX*scale, panY - sceneY*scale);
}

function toScene(cx,cy) { return {x:(cx-panX)/scale+sceneX, y:(cy-panY)/scale+sceneY}; }

function redraw() {
  // Clear everything
  [bgX, hX, gX, cX].forEach(ctx => ctx.clearRect(0, 0, bgC.width, bgC.height));
  
  // 1. Draw Background Snapshot
  if (bgImg) {
    bgX.save(); applyT(bgX);
    bgX.drawImage(bgImg, sceneX, sceneY, sceneW, sceneH);
    bgX.restore();
  }

  // 2. Draw History (strokes received since last snapshot)
  history.forEach(ev => {
    if (ev.type === 'hdraw' || ev.type === 'draw') {
      const targetCtx = (ev.type === 'hdraw') ? hX : gX;
      drawLine(targetCtx, ev.x, ev.y, ev.x2, ev.y2, ev.color, ev.width, false);
    } else if (ev.type === 'erase') {
      eraseAt(gX, ev.x, ev.y, ev.radius, false);
    } else if (ev.type === 'text') {
      drawText(gX, ev.x, ev.y, ev.content, ev.color, ev.size, false);
    }
  });

  // 3. Draw Cursors
  drawCursors();
  updateZoomLabel();
}

function drawLine(ctx, x1, y1, x2, y2, color, w, push = true) {
  if (push) history.push({type: (ctx === hX ? 'hdraw' : 'draw'), x:x1, y:y1, x2:x2, y2:y2, color, width:w});
  ctx.save(); applyT(ctx);
  ctx.strokeStyle = color; ctx.lineWidth = w;
  ctx.lineCap = ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.restore();
}

function eraseAt(ctx, x, y, r, push = true) {
  if (push) history.push({type: 'erase', x, y, radius:r});
  ctx.save(); applyT(ctx);
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawText(ctx, x, y, txt, color, sz, push = true) {
  if (push) history.push({type: 'text', x, y, content:txt, color, size:sz});
  ctx.save(); applyT(ctx);
  ctx.fillStyle = color; ctx.font = sz + 'px Inter, sans-serif';
  ctx.fillText(txt, x, y);
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
// Event Dispatcher
// ─────────────────────────────────────────────────────────────────────────────
function applyEv(ev) {
  switch(ev.type) {
    case 'init':
      applySceneInfo(ev);
      history = []; // reset on full page load
      loadSnap(ev.canvas, () => { fitScene(); redraw(); });
      setPage(ev.pageIdx||0);
      break;

    case 'snapshot':
      applySceneInfo(ev);
      // New snapshot from host means current history is now "baked" in
      loadSnap(ev.data, () => { history = []; redraw(); });
      break;

    case 'page_change':
      applySceneInfo(ev);
      history = [];
      loadSnap(ev.canvas, () => { fitScene(); redraw(); });
      setPage(ev.pageIdx||0);
      peersClear();
      toast('📄 Host moved to page '+((ev.pageIdx||0)+1));
      break;

    case 'hdraw':
      drawLine(hX, ev.x, ev.y, ev.x2, ev.y2, ev.color||'#222', ev.width||3);
      break;

    case 'draw':
      if (ev.id !== GUEST_ID)
        drawLine(gX, ev.x, ev.y, ev.x2, ev.y2, ev.color||'#2563eb', ev.width||3);
      break;

    case 'erase':
      if (ev.id !== GUEST_ID)
        eraseAt(gX, ev.x, ev.y, ev.radius||20);
      break;

    case 'text':
      if (ev.id !== GUEST_ID)
        drawText(gX, ev.x, ev.y, ev.content, ev.color||'#000', ev.size||18);
      break;

    case 'cursor':
      peers[ev.id] = { x: ev.x, y: ev.y, color: ev.color||'#f59e0b', name: ev.name||ev.id, isHost: ev.id==='host' };
      drawCursors();
      break;

    case 'viewport':
      if (followHost) { 
        const cz = ev.zoom || 1;
        scale = cz;
        panX  = bgC.width/2  - ev.cx * cz;
        panY  = bgC.height/2 - ev.cy * cz;
        redraw();
      }
      break;

    case 'page_count':
      updateSidebar(ev.count, ev.current);
      break;

    case 'clear':
      if (ev.id === GUEST_ID) {
        // I cleared my own — we could filter history, but usually just clear local
      } else {
        // Someone cleared — since history is shared, we'd need more logic, 
        // but for now just clear guest layer.
        gX.clearRect(0, 0, gC.width, gC.height);
      }
      break;
  }
}

function applySceneInfo(ev) {
  if (ev.sceneW) { sceneW=ev.sceneW; sceneH=ev.sceneH; sceneX=ev.sceneX||0; sceneY=ev.sceneY||0; }
}

function loadSnap(b64, cb) {
  if (!b64) { if(cb)cb(); return; }
  const img = new Image();
  img.onload = () => { bgImg=img; if(cb) cb(); else redraw(); };
  img.src = 'data:image/jpeg;base64,' + b64;
}

function peersClear() { Object.keys(peers).forEach(k=>delete peers[k]); drawCursors(); }

// ─────────────────────────────────────────────────────────────────────────────
// UI Helpers
// ─────────────────────────────────────────────────────────────────────────────
function joinSession() {
  const v = document.getElementById('nameInput').value.trim();
  MY_NAME = v || ('Guest-' + GUEST_ID.slice(0,4));
  document.getElementById('nameOverlay').style.display = 'none';
  document.getElementById('stxt').textContent = MY_NAME;
  connect();
  toast('Welcome, ' + MY_NAME + '!  Scroll to zoom, Middle-click to pan.', 6000);
}

function drawCursors() {
  cX.clearRect(0, 0, cC.width, cC.height);
  for (const id in peers) {
    const p = peers[id];
    const cp = toCanvas(p.x, p.y);
    const r = p.isHost ? 9 : 7;
    cX.save();
    cX.beginPath(); cX.arc(cp.x, cp.y, r, 0, Math.PI*2);
    cX.fillStyle = p.color; cX.fill();
    cX.strokeStyle = '#fff'; cX.lineWidth = p.isHost?2.5:1.5; cX.stroke();
    const label = p.isHost ? '👑 '+p.name : p.name;
    cX.font = (p.isHost?'bold 12px':'11px') + ' Inter, sans-serif';
    const tw = cX.measureText(label).width;
    cX.fillStyle = 'rgba(0,0,0,.6)';
    if(cX.roundRect) cX.beginPath(), cX.roundRect(cp.x+r+4, cp.y-10, tw+10, 18, 5), cX.fill();
    cX.fillStyle = p.isHost?'#93c5fd':'#fff';
    cX.fillText(label, cp.x+r+9, cp.y+3);
    cX.restore();
  }
}

function zoom(f) {
  const cx = bgC.width / 2, cy = bgC.height / 2;
  const oldS = scale;
  scale = Math.max(.05, Math.min(20, scale * f));
  const realF = scale / oldS;
  panX = cx - (cx - panX) * realF;
  panY = cy - (cy - panY) * realF;
  redraw();
}

function updateZoomLabel() {
  document.getElementById('zoomVal').textContent = Math.round(scale * 100) + '%';
}

function toggleFollow() {
  followHost = !followHost;
  document.getElementById('btn-follow').classList.toggle('factive', followHost);
  toast(followHost ? '📍 Following host' : '🔓 Free navigation', 2000);
  if (followHost) send({type: 'follow_me'});
}

function setTool(t) {
  tool=t;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+t)?.classList.add('active');
}

function adjText(d) {
  textSize = Math.max(8, Math.min(120, textSize+d));
  document.getElementById('tsDisp').textContent = textSize;
}

function clearMe() {
  history = history.filter(h => h.id !== GUEST_ID);
  redraw();
  send({type:'clear',id:GUEST_ID,name:MY_NAME});
}

function updateSidebar(count, current) {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const item = document.createElement('div');
    item.className = 'pageItem' + (i === current ? ' active' : '');
    item.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Page ${i+1}`;
    item.onclick = () => requestPage(i);
    sb.appendChild(item);
  }
}

function requestPage(idx) {
  if (followHost) return toast("Following host - can't switch pages manually", 2000);
  send({type: 'request_page', pageIdx: idx});
}

function setPage(idx) {
  document.getElementById('pageinfo').textContent = 'Page '+(idx+1);
  const items = document.querySelectorAll('.pageItem');
  items.forEach((it, i) => it.classList.toggle('active', i === idx));
}

// ─────────────────────────────────────────────────────────────────────────────
// Input handling
// ─────────────────────────────────────────────────────────────────────────────
let tool='draw', drawing=false, lastX=0, lastY=0, isPanning=false, panSX=0, panSY=0, textSize=18;

function getPos(e) {
  const r=gC.getBoundingClientRect();
  if(e.touches) return {x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top};
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}

function onDown(e) {
  if(e.button===1 || (e.touches && e.touches.length===2)){
    isPanning=true;
    const p=getPos(e); panSX=p.x-panX; panSY=p.y-panY;
    if(followHost){followHost=false;document.getElementById('btn-follow').classList.remove('factive');}
    return;
  }
  e.preventDefault(); drawing=true;
  const p=getPos(e), sp=toScene(p.x,p.y);
  lastX=sp.x; lastY=sp.y;
  if(tool==='text'){
    const txt=prompt('Enter text:');
    if(txt){
      const c=document.getElementById('colorPick').value;
      drawText(gX,sp.x,sp.y,txt,c,textSize);
      send({type:'text',id:GUEST_ID,name:MY_NAME,x:sp.x,y:sp.y,content:txt,color:c,size:textSize});
    }
    drawing=false;
  }
}

function onMove(e) {
  e.preventDefault();
  const p=getPos(e);
  if(isPanning){ panX=p.x-panSX; panY=p.y-panSY; redraw(); return; }
  const sp=toScene(p.x,p.y);
  sendCursor(sp.x,sp.y);
  if(!drawing) return;
  const color=document.getElementById('colorPick').value, sz=parseInt(document.getElementById('sizeSlider').value);
  if(tool==='draw'){
    drawLine(gX,lastX,lastY,sp.x,sp.y,color,sz);
    send({type:'draw',id:GUEST_ID,name:MY_NAME,x:lastX,y:lastY,x2:sp.x,y2:sp.y,color,width:sz});
  } else if(tool==='erase'){
    eraseAt(gX,sp.x,sp.y,sz*3);
    send({type:'erase',id:GUEST_ID,name:MY_NAME,x:sp.x,y:sp.y,radius:sz*3});
  }
  lastX=sp.x; lastY=sp.y;
}

function sendCursor(sx,sy) {
  if(Date.now()-(sendCursor.last||0) < 33) return;
  sendCursor.last=Date.now();
  send({type:'cursor',id:GUEST_ID,name:MY_NAME,color:MY_COLOR,x:sx,y:sy});
}

function onUp(){drawing=false;isPanning=false;}

gC.addEventListener('pointerdown',  onDown,  {passive:false});
gC.addEventListener('pointermove',  onMove,  {passive:false});
gC.addEventListener('pointerup',    onUp);
gC.addEventListener('pointercancel',onUp);
gC.addEventListener('wheel',e=>{
  e.preventDefault();
  const p=getPos(e), f=e.deltaY>0?.9:1.1;
  scale=Math.max(.1,Math.min(8,scale*f));
  panX=p.x-(p.x-panX)*f; panY=p.y-(p.y-panY)*f;
  redraw();
},{passive:false});

document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  const k=e.key.toLowerCase();
  if(k==='d') setTool('draw'); else if(k==='e') setTool('erase'); else if(k==='t') setTool('text');
  else if(k==='f') toggleFollow(); else if(k==='x') clearMe();
  else if(k==='=' || k==='+') zoom(1.2); else if(k==='-' || k==='_') zoom(0.8);
  else if(k==='0') { fitScene(); redraw(); }
});

// ─────────────────────────────────────────────────────────────────────────────
// Connection
// ─────────────────────────────────────────────────────────────────────────────
let ws=null;
function send(obj){if(ws&&ws.readyState===1)ws.send(JSON.stringify(obj));}

function connect(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(proto+'//'+location.host+'/ws');
  ws.onopen=()=>{ setStatus(true); send({type:'hello',id:GUEST_ID,name:MY_NAME,color:MY_COLOR}); };
  ws.onclose=()=>{ setStatus(false); toast('Disconnected — reconnecting…'); setTimeout(connect,3000); };
  ws.onerror=err=>console.error('WS',err);
  ws.onmessage=m=>{try{applyEv(JSON.parse(m.data));}catch(e){console.error(e);}};
}
function setStatus(ok){ document.getElementById('dot').className=ok?'ok':''; document.getElementById('stxt').textContent=ok?MY_NAME:'Disconnected'; }
function toast(msg,dur=3000){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),dur); }

resize();
</script>
