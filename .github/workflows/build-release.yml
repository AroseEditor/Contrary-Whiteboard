name: Build & Draft Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

env:
  QT_VERSION: '6.8.3'
  APP_NAME: 'ContraryWhiteboard'

# ============================================================
# WINDOWS — MSVC + NSIS installer
# ============================================================
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $maj   = (Select-String 'VERSION_MAJ\s*=\s*(\d+)'   version.txt).Matches[0].Groups[1].Value
          $min   = (Select-String 'VERSION_MIN\s*=\s*(\d+)'   version.txt).Matches[0].Groups[1].Value
          $patch = (Select-String 'VERSION_PATCH\s*=\s*(\d+)' version.txt).Matches[0].Groups[1].Value
          $vtype = (Select-String 'VERSION_TYPE\s*=\s*(\w+)'  version.txt).Matches[0].Groups[1].Value
          $ver = "$maj.$min.$patch"
          if ($vtype -ne 'r') { $ver = "$ver-$vtype" }
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Install Windows deps (zlib, ffmpeg, pkgconfig)
        shell: pwsh
        run: |
          vcpkg install zlib:x64-windows ffmpeg:x64-windows
          choco install pkgconfiglite -y --no-progress
          echo "ZLIB_ROOT=C:\vcpkg\installed\x64-windows" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=C:\vcpkg\installed\x64-windows\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "C:\ProgramData\chocolatey\lib\pkgconfiglite\tools" >> $env:GITHUB_PATH

      - name: Install Qt (with WebEngine)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtwebengine qtmultimedia qt5compat qtwebchannel qtpositioning
          aqtversion: '==3.1.*'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DQT_VERSION=6 `
            -DCMAKE_BUILD_TYPE=Release `
            -DZLIB_ROOT="$env:ZLIB_ROOT"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Stage + windeployqt
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path deploy -Force

          $exe = Get-ChildItem -Path build -Recurse -Filter "*.exe" |
                 Where-Object { $_.Name -notmatch 'cmake|moc|rcc|uic|install' } |
                 Select-Object -First 1
          if (-not $exe) { Write-Error "No exe found"; exit 1 }
          Write-Host "Found: $($exe.FullName)"
          Copy-Item $exe.FullName deploy\ContraryWhiteboard.exe

          & "$env:Qt6_DIR\bin\windeployqt.exe" `
              --release --no-translations `
              --no-system-d3d-compiler --no-opengl-sw `
              deploy\ContraryWhiteboard.exe

          foreach ($d in @('etc','library','fonts','customizations','i18n')) {
            if (Test-Path "resources/$d") {
              Copy-Item -Recurse "resources/$d" "deploy/$d"
            }
          }

          Get-ChildItem -Path thirdpartydeps -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName deploy\ -ErrorAction SilentlyContinue }

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build NSIS installer
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          $nsi = @"
          Unicode True
          !include "MUI2.nsh"
          !include "FileFunc.nsh"

          Name "Contrary Whiteboard"
          OutFile "ContraryWhiteboard-$env:APP_VERSION-Setup-x64.exe"
          InstallDir "`$PROGRAMFILES64\Contrary Whiteboard"
          InstallDirRegKey HKLM "Software\ContraryWhiteboard" "InstallDir"
          RequestExecutionLevel admin

          VIProductVersion "$($env:APP_VERSION -replace '-.*','').0"
          VIAddVersionKey "ProductName"     "Contrary Whiteboard"
          VIAddVersionKey "CompanyName"     "AroseEditor"
          VIAddVersionKey "LegalCopyright"  "(c) 2026 AroseEditor"
          VIAddVersionKey "FileDescription" "Contrary Whiteboard Installer"
          VIAddVersionKey "FileVersion"     "$env:APP_VERSION"
          VIAddVersionKey "ProductVersion"  "$env:APP_VERSION"

          !define MUI_ABORTWARNING
          !define MUI_WELCOMEPAGE_TITLE "Welcome to Contrary Whiteboard Setup"
          !define MUI_FINISHPAGE_RUN "`$INSTDIR\ContraryWhiteboard.exe"
          !define MUI_FINISHPAGE_RUN_TEXT "Launch Contrary Whiteboard"

          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_LICENSE "LICENSE"
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"

          Section "Install"
            SetOutPath "`$INSTDIR"
            File /r "deploy\*.*"
            WriteUninstaller "`$INSTDIR\Uninstall.exe"
            CreateDirectory "`$SMPROGRAMS\Contrary Whiteboard"
            CreateShortcut "`$SMPROGRAMS\Contrary Whiteboard\Contrary Whiteboard.lnk" "`$INSTDIR\ContraryWhiteboard.exe"
            CreateShortcut "`$SMPROGRAMS\Contrary Whiteboard\Uninstall.lnk" "`$INSTDIR\Uninstall.exe"
            CreateShortcut "`$DESKTOP\Contrary Whiteboard.lnk" "`$INSTDIR\ContraryWhiteboard.exe"
            WriteRegStr   HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ContraryWhiteboard" "DisplayName"     "Contrary Whiteboard"
            WriteRegStr   HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ContraryWhiteboard" "UninstallString" '"`$INSTDIR\Uninstall.exe"'
            WriteRegStr   HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ContraryWhiteboard" "Publisher"       "AroseEditor"
            WriteRegStr   HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ContraryWhiteboard" "DisplayVersion"  "$env:APP_VERSION"
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ContraryWhiteboard" "NoModify" 1
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ContraryWhiteboard" "NoRepair" 1
            `${GetSize} "`$INSTDIR" "/S=0K" `$0 `$1 `$2
            IntFmt `$0 "0x%08X" `$0
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ContraryWhiteboard" "EstimatedSize" "`$0"
            WriteRegStr HKCR ".ubz" "" "ContraryWhiteboard.Document"
            WriteRegStr HKCR "ContraryWhiteboard.Document" "" "Contrary Whiteboard Document"
            WriteRegStr HKCR "ContraryWhiteboard.Document\shell\open\command" "" '"`$INSTDIR\ContraryWhiteboard.exe" "%1"'
          SectionEnd

          Section "Uninstall"
            RMDir /r "`$INSTDIR"
            RMDir /r "`$SMPROGRAMS\Contrary Whiteboard"
            Delete "`$DESKTOP\Contrary Whiteboard.lnk"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ContraryWhiteboard"
            DeleteRegKey HKLM "Software\ContraryWhiteboard"
            DeleteRegKey HKCR ".ubz"
            DeleteRegKey HKCR "ContraryWhiteboard.Document"
          SectionEnd
          "@
          $nsi | Out-File -FilePath installer.nsi -Encoding UTF8
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ContraryWhiteboard-*-Setup-x64.exe

# ============================================================
# macOS — Universal (arm64 + x86_64) DMG
# ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Read version
        id: ver
        run: |
          MAJ=$(grep 'VERSION_MAJ'   version.txt | head -1 | cut -d= -f2 | tr -d ' \r')
          MIN=$(grep 'VERSION_MIN'   version.txt | head -1 | cut -d= -f2 | tr -d ' \r')
          PAT=$(grep 'VERSION_PATCH' version.txt | head -1 | cut -d= -f2 | tr -d ' \r')
          TYP=$(grep 'VERSION_TYPE'  version.txt | head -1 | cut -d= -f2 | tr -d ' \r')
          VER="$MAJ.$MIN.$PAT"
          [ "$TYP" != "r" ] && VER="$VER-$TYP"
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Install Qt (with WebEngine)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtwebengine qtmultimedia qt5compat qtwebchannel qtpositioning
          # FIX: pin aqt to 3.1.x
          aqtversion: '==3.1.*'

      - name: Install deps
        run: brew install poppler openssl@3 ffmpeg

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
            -DQT_VERSION=6 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.logicalcpu)

      - name: Package DMG
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          APP=$(find build -name "*.app" -not -path "*/Qt*" -not -path "*/qt*" | head -1)
          [ -z "$APP" ] && echo "No .app found" && exit 1
          echo "Found: $APP"

          "$Qt6_DIR/bin/macdeployqt" "$APP" -dmg -always-overwrite

          DMG_SRC="${APP%.app}.dmg"
          mv "$DMG_SRC" "ContraryWhiteboard-$APP_VERSION-macOS.dmg"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ContraryWhiteboard-*-macOS.dmg

# ============================================================
# Linux — DEB + AppImage
# ============================================================
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Read version
        id: ver
        run: |
          MAJ=$(grep 'VERSION_MAJ'   version.txt | head -1 | cut -d= -f2 | tr -d ' \r')
          MIN=$(grep 'VERSION_MIN'   version.txt | head -1 | cut -d= -f2 | tr -d ' \r')
          PAT=$(grep 'VERSION_PATCH' version.txt | head -1 | cut -d= -f2 | tr -d ' \r')
          TYP=$(grep 'VERSION_TYPE'  version.txt | head -1 | cut -d= -f2 | tr -d ' \r')
          VER="$MAJ.$MIN.$PAT"
          [ "$TYP" != "r" ] && VER="$VER-$TYP"
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libpoppler-dev libpoppler-cpp-dev \
            libssl-dev libfreetype-dev \
            zlib1g-dev \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev \
            libfontconfig-dev libasound2-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxcb-xinerama0-dev libxcb-icccm4-dev \
            libxcb-image0-dev libxcb-keysyms1-dev \
            libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-shape0-dev libxcb-sync-dev \
            libxcb-xfixes0-dev libxcb-xkb-dev \
            libdbus-1-dev libpulse-dev \
            desktop-file-utils

      # jurplel/install-qt-action uses aqt internally and both 3.1.x and 3.3.x
      # fail to parse the Qt 6.8.x module XML on Linux. Call aqt directly with
      # --base pointing to a mirror that serves the correct metadata.
      - name: Install Qt (with WebEngine)
        run: |
          pip install "aqtinstall==3.1.*" --quiet
          python -m aqt install-qt linux desktop ${{ env.QT_VERSION }} gcc_64 \
            --outputdir $HOME/Qt \
            --modules qtwebengine qtmultimedia qt5compat qtwebchannel qtpositioning \
            --base https://mirrors.ocf.berkeley.edu/qt/
          echo "Qt6_DIR=$HOME/Qt/${{ env.QT_VERSION }}/gcc_64" >> $GITHUB_ENV
          echo "$HOME/Qt/${{ env.QT_VERSION }}/gcc_64/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=$HOME/Qt/${{ env.QT_VERSION }}/gcc_64/lib" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
            -DQT_VERSION=6 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Create DEB
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          PKG="contrarywhiteboard_${APP_VERSION}_amd64"
          mkdir -p $PKG/DEBIAN
          mkdir -p $PKG/usr/bin
          mkdir -p $PKG/usr/share/applications
          mkdir -p $PKG/usr/share/icons/hicolor/256x256/apps
          mkdir -p $PKG/usr/share/contrarywhiteboard

          BIN=$(find build -maxdepth 2 -type f \( -name "contrarywhiteboard" -o -name "ContraryWhiteboard" \) | head -1)
          [ -z "$BIN" ] && BIN=$(find build -maxdepth 3 -type f -executable ! -name "*.so" | grep -i contrary | head -1)
          cp "$BIN" $PKG/usr/bin/contrarywhiteboard
          chmod +x $PKG/usr/bin/contrarywhiteboard

          for d in etc library fonts i18n customizations; do
            [ -d "resources/$d" ] && cp -r "resources/$d" "$PKG/usr/share/contrarywhiteboard/"
          done
          cp resources/images/ContraryWhiteboard.png \
            $PKG/usr/share/icons/hicolor/256x256/apps/contrarywhiteboard.png 2>/dev/null || true

          printf '[Desktop Entry]\nName=Contrary Whiteboard\nComment=Interactive Whiteboard for Education\nExec=contrarywhiteboard %%f\nIcon=contrarywhiteboard\nTerminal=false\nType=Application\nCategories=Education;\nMimeType=application/vnd.mnemis-uniboard-document;\n' \
            > $PKG/usr/share/applications/contrarywhiteboard.desktop

          printf 'Package: contrarywhiteboard\nVersion: %s\nSection: education\nPriority: optional\nArchitecture: amd64\nDepends: libqt6core6 (>= 6.2), libqt6gui6, libqt6widgets6, libqt6network6, libqt6xml6, libqt6svg6, libssl3\nMaintainer: AroseEditor <https://github.com/AroseEditor>\nHomepage: https://github.com/AroseEditor/Contrary-Whiteboard\nDescription: Contrary Whiteboard - Interactive Whiteboard\n A cross-platform interactive whiteboard for education and presentations.\n' \
            "${APP_VERSION}" > $PKG/DEBIAN/control

          dpkg-deb --build --root-owner-group $PKG
          mv ${PKG}.deb contrarywhiteboard_${APP_VERSION}_amd64.deb

      - name: Create AppImage
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/contrarywhiteboard

          BIN=$(find build -maxdepth 2 -type f \( -name "contrarywhiteboard" -o -name "ContraryWhiteboard" \) | head -1)
          [ -z "$BIN" ] && BIN=$(find build -maxdepth 3 -type f -executable ! -name "*.so" | grep -i contrary | head -1)
          cp "$BIN" AppDir/usr/bin/contrarywhiteboard
          chmod +x AppDir/usr/bin/contrarywhiteboard

          cp resources/images/ContraryWhiteboard.png \
            AppDir/usr/share/icons/hicolor/256x256/apps/contrarywhiteboard.png 2>/dev/null || true
          cp resources/images/ContraryWhiteboard.png \
            AppDir/contrarywhiteboard.png 2>/dev/null || true

          for d in etc library fonts i18n customizations; do
            [ -d "resources/$d" ] && cp -r "resources/$d" "AppDir/usr/share/contrarywhiteboard/"
          done

          printf '[Desktop Entry]\nName=Contrary Whiteboard\nExec=contrarywhiteboard\nIcon=contrarywhiteboard\nType=Application\nCategories=Education;\n' \
            > AppDir/contrarywhiteboard.desktop

          export QMAKE="$Qt6_DIR/bin/qmake"
          export LD_LIBRARY_PATH="$Qt6_DIR/lib:$LD_LIBRARY_PATH"
          export OUTPUT="ContraryWhiteboard-$APP_VERSION-Linux-x86_64.AppImage"

          ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run \
            --appdir AppDir \
            --plugin qt \
            --output appimage || true

          find . -maxdepth 1 -name "*.AppImage" ! -name "linuxdeploy*" \
            -exec mv {} "ContraryWhiteboard-$APP_VERSION-Linux-x86_64.AppImage" \; 2>/dev/null || true

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: contrarywhiteboard_*_amd64.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: ContraryWhiteboard-*-Linux-x86_64.AppImage
          if-no-files-found: ignore

# ============================================================
# Draft Release
# ============================================================
  draft-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f

      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "name=Contrary Whiteboard ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=dev-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
            echo "name=Contrary Whiteboard Dev Build $(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        run: |
          cat > CHANGELOG.md << 'EOF'
          ## What's New

          EOF
          git log --oneline -20 >> CHANGELOG.md 2>/dev/null || echo "Initial release" >> CHANGELOG.md
          cat >> CHANGELOG.md << 'EOF'

          ## Downloads

          | Platform | File |
          |----------|------|
          | **Windows** | `ContraryWhiteboard-*-Setup-x64.exe` |
          | **macOS** | `ContraryWhiteboard-*-macOS.dmg` |
          | **Linux (DEB)** | `contrarywhiteboard_*_amd64.deb` |
          | **Linux (AppImage)** | `ContraryWhiteboard-*-Linux-x86_64.AppImage` |

          ---
          *Contrary Whiteboard is a fork of [OpenBoard](https://github.com/OpenBoard-org/OpenBoard)*
          EOF

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body_path: CHANGELOG.md
          draft: true
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            release-artifacts/windows-installer/ContraryWhiteboard-*-Setup-x64.exe
            release-artifacts/macos-dmg/ContraryWhiteboard-*-macOS.dmg
            release-artifacts/linux-deb/contrarywhiteboard_*_amd64.deb
            release-artifacts/linux-appimage/ContraryWhiteboard-*-Linux-x86_64.AppImage