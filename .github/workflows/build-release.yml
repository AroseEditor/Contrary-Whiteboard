name: Build & Draft Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        default: 'dev'
      build-macos:
        description: 'Build macOS app'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

env:
  QT_VERSION: '6.8.3'

jobs:
  # ============================================================
  # WINDOWS — MSVC + NSIS
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtwebengine qtmultimedia qt5compat qtwebchannel qtpositioning qtserialport
          aqtversion: '==3.1.*'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Run Build Script
        shell: cmd
        run: build_windows.bat
        env:
          VCPKG_ROOT: C:\vcpkg

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ContraryWhiteboard-*-setup.exe

  # ============================================================
  # macOS — Universal DMG
  # ============================================================
  build-macos:
    runs-on: macos-latest
    if: github.event.inputs.build-macos == 'true' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtwebengine qtmultimedia qt5compat qtwebchannel qtpositioning qtserialport
          aqtversion: '==3.1.*'

      - name: Install deps
        run: brew install poppler openssl@3 ffmpeg pkg-config

      - name: Run Build Script
        run: chmod +x build_macos.sh && ./build_macos.sh

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ContraryWhiteboard-*-macOS.dmg

  # ============================================================
  # Draft Release
  # ============================================================
  draft-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "name=Contrary Whiteboard ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=dev-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
            echo "name=Contrary Whiteboard Dev Build $(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        run: |
          cat > CHANGELOG.md << 'EOF'
          ## What's New
          
          This release includes:
          - Full rebranding to Contrary Whiteboard
          - Migration to Qt 6.8.3
          - Improved Windows/macOS build pipeline
          - Fixed linkage and translation issues
          
          EOF
          git log --oneline -20 >> CHANGELOG.md 2>/dev/null || echo "Initial release" >> CHANGELOG.md

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body_path: CHANGELOG.md
          draft: true
          prerelease: false
          files: |
            release-artifacts/windows-installer/ContraryWhiteboard-*-setup.exe
            release-artifacts/macos-dmg/ContraryWhiteboard-*-macOS.dmg